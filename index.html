<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Out From Adult Life 😅</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#6dd5ed,#2193b0,#a18cd1);
    background-size:300% 300%;
    animation:bgMove 10s ease infinite;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.card{
    width:90%;
    max-width:450px;
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(20px);
    border-radius:25px;
    padding:40px;
    text-align:center;
    color:white;
    box-shadow:0 15px 35px rgba(0,0,0,.25);
}

h1{
    font-size:32px;
    margin-bottom:10px;
}

p{
    opacity:.9;
    margin-bottom:30px;
}

button{
    border:none;
    padding:18px 30px;
    border-radius:50px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    background:white;
    color:#4f46e5;
    transition:.3s;
}

button:hover{
    transform:scale(1.08);
    box-shadow:0 10px 25px rgba(0,0,0,.25);
}

#message{
    margin-top:30px;
    font-size:20px;
    min-height:70px;
    transition:.3s;
}
</style>

</head>
<body>

<div class="card">

<h1>👋 Adult Life</h1>

<p>Press the button if you need a little break from responsibilities.</p>

<button onclick="logoutAdult()">
Sign out from adult life 😅
</button>

<div id="message"></div>

</div>

<script>

const messages = [
"🎈 Welcome back to childhood!",

"🍦 Ice cream is officially a valid dinner.",
"😴 Naps are mandatory. No meetings allowed.",
"🎮 Homework has been replaced with video games.",
"🚲 Go ride your bike before sunset.",
"🍭 Candy has unlimited refills today.",
"📺 Cartoons are now your full-time job.",
"🌈 Bills have been permanently deleted.",
"🐻 Adult mode has been successfully uninstalled.",
"📚 Bedtime stories are back.",
"🌟 Be home before the street lights turn on.",
"🫧 Worries have left the chat.",
"🎉 Congratulations! You're 10 years old again.",
"🚫 No taxes. No stress. Just snacks.",
"🍕 Pizza solves everything again.",
"☁️ Your imagination is your superpower.",
"🌼 Smile first. Overthink later.",
"😂 Growing up has been canceled.",
"❤️ Life feels lighter already.",
"🍼 Your coffee has been replaced with chocolate milk.",
"📱 Screen time limit: 30 minutes.",
"🧦 Matching socks are no longer required.",
"🦖 Dinosaurs are real again.",
"🍪 Cookie theft is now legal.",
"🎁 Every day is your birthday.",
"😅 Error 404: Responsibilities not found.",
"🎠 Welcome to the happiest version of yourself.",
"🌞 Today is for playing, not worrying.",
"🎨 Time to color outside the lines!",
"🌻 Adult life has been paused.",

"🎈 You unlocked: Stress-Free Mode.",
"💤 Alarm clocks have been disabled.",
"🎡 Happiness level: 100%.",
"🌙 Tomorrow is Saturday forever!",
"🐱 Your pet is now your boss.",
"🍩 Calories have taken the day off.",
"🚀 Escape mission completed successfully!",
"🥳 Adult responsibilities have been archived."

function logoutAdult(){

const randomMessage =
messages[Math.floor(Math.random()*messages.length)];

document.getElementById("message").innerHTML=randomMessage;

}

</script>

</body>
</html>
