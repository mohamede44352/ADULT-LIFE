<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adult Life Logout</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#74ebd5,#ACB6E5);
    overflow:hidden;
}

.card{
    background:rgba(255,255,255,.18);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.3);
    border-radius:25px;
    padding:45px;
    text-align:center;
    width:380px;
    color:white;
    box-shadow:0 20px 40px rgba(0,0,0,.25);
}

h1{
    margin-bottom:15px;
    font-size:30px;
}

p{
    opacity:.9;
    margin-bottom:30px;
}

button{
    background:white;
    color:#4b5cff;
    border:none;
    padding:16px 28px;
    font-size:18px;
    font-weight:bold;
    border-radius:50px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-4px) scale(1.05);
    box-shadow:0 12px 25px rgba(0,0,0,.2);
}

#message{
    margin-top:25px;
    font-size:20px;
    opacity:0;
    transition:.5s;
}

.show{
    opacity:1 !important;
}
</style>
</head>

<body>

<div class="card">
    <h1>Adult Life</h1>
    <p>Ready to take a break?</p>

    <button onclick="logoutAdult()">
        Sign out from adult life 😅
    </button>

    <div id="message"></div>
</div>

<script>
function logoutAdult(){
    const msg = document.getElementById("message");

    const messages = [
        "✅ Logged out successfully!",
        "🧸 Welcome back to childhood!",
        "🍕 Your only responsibility now is eating snacks.",
        "🎮 Homework replaced with video games.",
        "😴 Unlimited naps activated!"
    ];

    msg.innerHTML = messages[Math.floor(Math.random()*messages.length)];
    msg.classList.add("show");
}
</script>

</body>
</html>
